name: Compilar WIDMAN IOS (.ipa)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Compilando en Servidor macOS de GitHub
    runs-on: macos-14
    
    steps:
      - name: 1. Descargar Código Fuente
        uses: actions/checkout@v4

      - name: 2. Descomprimir el archivo ZIP de Replit
        run: |
          echo "[SISTEMA]: Descomprimiendo archivos de origen..."
          unzip -q widman-ios-source.zip -d ./unzipped_project || true
          REAL_PATH=$(dirname $(find . -name "package.json" | head -n 1))
          echo "PROYECTO_ENCONTRADO=$REAL_PATH" >> $GITHUB_ENV
          echo "[SISTEMA]: Proyecto localizado en: $REAL_PATH"

      - name: 3. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 4. Inyectar package.json Completo e Instalar Dependencias
        run: |
          cd "${{ env.PROYECTO_ENCONTRADO }}"
          cat << 'EOF' > package.json
          {
            "name": "widman-ios",
            "version": "1.0.0",
            "private": true,
            "main": "index.js",
            "scripts": {
              "start": "expo start"
            },
            "dependencies": {
              "expo": "~54.0.27",
              "expo-status-bar": "~3.0.9",
              "react": "18.3.1",
              "react-native": "0.76.7",
              "expo-document-picker": "~13.0.2",
              "expo-file-system": "~18.0.7",
              "expo-sharing": "~14.0.8",
              "react-native-webview": "13.15.0",
              "expo-router": "~6.0.17",
              "react-native-safe-area-context": "~5.6.0",
              "react-native-screens": "~4.16.0"
            },
            "devDependencies": {
              "@babel/core": "^7.25.2"
            }
          }
          EOF
          
          echo "import { registerRootComponent } from 'expo'; import App from './App'; registerRootComponent(App);" > index.js
          npm install --legacy-peer-deps

      - name: 5. Instalar EAS CLI de Expo
        run: npm install -g eas-cli

      - name: 6. Pre-compilar Estructura de iOS y Correr Xcode
        run: |
          cd "${{ env.PROYECTO_ENCONTRADO }}"
          
          echo "[SISTEMA]: Generando archivos nativos de Apple..."
          npx expo prebuild --platform ios --no-install
          
          echo "[SISTEMA]: Instalando CocoaPods de forma manual..."
          cd ios && pod install
          
          echo "[SISTEMA]: Compilando ejecutable de iPhone..."
          xcodebuild -workspace *.xcworkspace -scheme "WIDMANIOS" -configuration Debug -sdk iphonesimulator -arch x86_64 CODE_SIGNING_ALLOWED=NO -quiet

      - name: 7. Subir archivo final a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: WIDMAN-IOS-Simulador
          path: ./**/*.app
