name: Compilar WIDMAN IOS (.ipa)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Compilando en Servidor macOS de GitHub
    runs-on: macos-14
    
    steps:
      - name: 1. Descargar Código Fuente
        uses: actions/checkout@v4

      - name: 2. Descomprimir el archivo ZIP de Replit
        run: |
          echo "[SISTEMA]: Descomprimiendo archivos de origen..."
          unzip -q widman-ios-source.zip -d ./unzipped_project || true
          REAL_PATH=$(dirname $(find . -name "package.json" | head -n 1))
          echo "PROYECTO_ENCONTRADO=$REAL_PATH" >> $GITHUB_ENV
          echo "[SISTEMA]: Proyecto localizado en: $REAL_PATH"

      - name: 3. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 4. Inyectar package.json Limpio e Instalar Dependencias
        run: |
          cd "${{ env.PROYECTO_ENCONTRADO }}"
          
          echo "[SISTEMA]: Sobrescribiendo package.json con una estructura limpia y sin errores..."
          # Escribir directamente el archivo JSON perfecto sin depender de las comas rotas de Replit
          cat << 'EOF' > package.json
          {
            "name": "widman-ios",
            "version": "1.0.0",
            "private": true,
            "main": "expo-router/entry",
            "scripts": {
              "dev": "expo start"
            },
            "dependencies": {
              "@expo-google-fonts/inter": "^0.4.0",
              "@expo/vector-icons": "^15.0.3",
              "@react-native-async-storage/async-storage": "2.2.0",
              "@stardazed/streams-text-encoding": "^1.0.2",
              "@tanstack/react-query": "^5.0.0",
              "@ungap/structured-clone": "^1.3.0",
              "expo": "~54.0.27",
              "expo-blur": "~15.0.8",
              "expo-constants": "~18.0.11",
              "expo-document-picker": "~13.0.2",
              "expo-file-system": "~18.0.7",
              "expo-font": "~14.0.10",
              "expo-glass-effect": "~0.1.4",
              "expo-haptics": "~15.0.8",
              "expo-image": "~3.0.11",
              "expo-image-picker": "~17.0.9",
              "expo-linear-gradient": "~15.0.8",
              "expo-linking": "~8.0.10",
              "expo-location": "~19.0.8",
              "expo-router": "~6.0.17",
              "expo-sharing": "~14.0.8",
              "expo-splash-screen": "~31.0.12",
              "expo-status-bar": "~3.0.9",
              "expo-symbols": "~1.0.8",
              "expo-system-ui": "~6.0.9",
              "expo-web-browser": "~15.0.10",
              "react": "18.3.1",
              "react-dom": "18.3.1",
              "react-native": "0.76.7",
              "react-native-gesture-handler": "~2.28.0",
              "react-native-keyboard-controller": "1.18.5",
              "react-native-reanimated": "~4.1.1",
              "react-native-safe-area-context": "~5.6.0",
              "react-native-screens": "~4.16.0",
              "react-native-svg": "15.12.1",
              "react-native-web": "^0.19.13",
              "react-native-webview": "13.15.0",
              "react-native-worklets": "0.5.1",
              "zod": "^3.23.8",
              "zod-validation-error": "^3.4.0"
            },
            "devDependencies": {
              "@babel/core": "^7.25.2",
              "@types/react": "~18.3.12",
              "typescript": "~5.3.3"
            }
          }
          EOF
          
          echo "[SISTEMA]: Instalando paquetes de WIDMAN IOS de forma segura..."
          npm install --legacy-peer-deps

      - name: 5. Instalar EAS CLI de Expo
        run: npm install -g eas-cli

      - name: 6. Instalar Certificados Oficiales de Apple
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: "temporal_password_123"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: 7. Compilar archivo .ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd "${{ env.PROYECTO_ENCONTRADO }}"
          npx eas-cli build --platform ios --profile preview --local --non-interactive

      - name: 8. Subir archivo final .ipa a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: WIDMAN-IOS-Instalable
          path: ./**/*.ipa
