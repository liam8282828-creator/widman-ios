name: Compilar WIDMAN IOS (.ipa)

on:
  workflow_dispatch: # Te permite activar la compilación manualmente con un botón

jobs:
  build-ios:
    name: Compilando en Servidor macOS de GitHub
    runs-on: macos-14 # Fuerza el uso de los servidores Mac oficiales de GitHub
    
    steps:
      - name: 1. Descargar Código Fuente
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js (Versión Actualizada)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. Detectar carpeta del proyecto e Instalar Dependencias
        run: |
          # Buscar de forma automática dónde está el archivo package.json real
          TARGET_DIR=$(dirname $(find . -name "package-json" -o -name "package.json" | head -n 1))
          echo "[SISTEMA]: Proyecto encontrado en la ruta: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # Guardar la ruta exacta en una variable global para los siguientes pasos
          echo "PROJECT_PATH=$TARGET_DIR" >> $GITHUB_ENV
          
          # Instalar paquetes
          npm install --legacy-peer-deps

      - name: 4. Instalar EAS CLI de Expo
        run: npm install -g eas-cli

      - name: 5. Instalar Certificados Oficiales de Apple en la Mac Virtual
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: "temporal_password_123"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: 6. Compilar archivo .ipa en la Nube
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Entrar a la ruta guardada automáticamente y lanzar el empaquetador
          cd "${{ env.PROJECT_PATH }}"
          npx eas-cli build --platform ios --profile preview --local --non-interactive

      - name: 7. Subir archivo final .ipa a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: WIDMAN-IOS-Instalable
          path: ./**/*.ipa # Busca recursivamente el archivo IPA en cualquier carpeta
