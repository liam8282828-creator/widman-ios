name: Compilar WIDMAN IOS (.ipa)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Compilando en Servidor macOS de GitHub
    runs-on: macos-14
    
    steps:
      - name: 1. Descargar Código Fuente
        uses: actions/checkout@v4

      - name: 2. Descomprimir el archivo ZIP de Replit
        run: |
          echo "[SISTEMA]: Descomprimiendo archivos de origen..."
          unzip -q widman-ios-source.zip -d ./unzipped_project || true
          REAL_PATH=$(dirname $(find . -name "package.json" | head -n 1))
          echo "PROYECTO_ENCONTRADO=$REAL_PATH" >> $GITHUB_ENV
          echo "[SISTEMA]: Proyecto localizado en: $REAL_PATH"

      - name: 3. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 4. Parchear Catalogs de Replit e Instalar Dependencias
        run: |
          cd "${{ env.PROYECTO_ENCONTRADO }}"
          
          echo "[SISTEMA]: Limpiando el archivo package.json corrupto de Replit..."
          # Reemplazar los "catalog:" rotos por versiones válidas usando comandos de texto nativos
          sed -i '' 's/"catalog:"/"^5.0.0"/g' package.json
          sed -i '' 's/"@workspace\/api-client-react": "workspace:\*"//g' package.json
          
          echo "[SISTEMA]: Instalando paquetes de WIDMAN IOS..."
          npm install --legacy-peer-deps

      - name: 5. Instalar EAS CLI de Expo
        run: npm install -g eas-cli

      - name: 6. Instalar Certificados Oficiales de Apple
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: "temporal_password_123"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: 7. Compilar archivo .ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd "${{ env.PROYECTO_ENCONTRADO }}"
          npx eas-cli build --platform ios --profile preview --local --non-interactive

      - name: 8. Subir archivo final .ipa a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: WIDMAN-IOS-Instalable
          path: ./**/*.ipa
